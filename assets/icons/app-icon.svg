<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A8F"/>
      <stop offset="100%" stop-color="#0A1F5C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B5CE6"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- Book base glow -->
  <ellipse cx="60" cy="95" rx="44" ry="6" fill="#0A84FF" opacity="0.35"/>

  <!-- Book pages left -->
  <path d="M18 82 Q18 38 60 32 Q60 32 60 88 Q38 88 18 82Z" fill="#1E3FA0" stroke="#2B5CE6" stroke-width="0.8"/>
  <!-- Book pages right -->
  <path d="M102 82 Q102 38 60 32 Q60 32 60 88 Q82 88 102 82Z" fill="#1E3FA0" stroke="#2B5CE6" stroke-width="0.8"/>

  <!-- Book cover left -->
  <path d="M14 84 Q14 36 60 30 L60 86 Q36 86 14 84Z" fill="url(#glow)" opacity="0.9"/>
  <!-- Book cover right -->
  <path d="M106 84 Q106 36 60 30 L60 86 Q84 86 106 84Z" fill="url(#glow)" opacity="0.9"/>

  <!-- Spine glow -->
  <rect x="57" y="30" width="6" height="58" rx="3" fill="#FFB020" opacity="0.85"/>
  <ellipse cx="60" cy="88" rx="4" ry="2.5" fill="#FF8C00" opacity="0.9"/>

  <!-- Car silhouette on left page -->
  <g transform="translate(22, 50) scale(0.32)" fill="white" opacity="0.9">
    <path d="M10 60 L20 35 Q25 22 55 20 L90 20 Q115 22 120 35 L130 60 L140 60 L140 75 L10 75 Z"/>
    <circle cx="38" cy="78" r="12" fill="#1E3FA0"/>
    <circle cx="38" cy="78" r="7" fill="#2B5CE6"/>
    <circle cx="108" cy="78" r="12" fill="#1E3FA0"/>
    <circle cx="108" cy="78" r="7" fill="#2B5CE6"/>
  </g>

  <!-- Lines on right page -->
  <circle cx="74" cy="48" r="4" fill="#34D399"/>
  <rect x="80" y="46" width="20" height="4" rx="2" fill="white" opacity="0.8"/>
  <rect x="74" y="58" width="26" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
  <rect x="74" y="66" width="22" height="3.5" rx="1.75" fill="white" opacity="0.45"/>
  <rect x="74" y="74" width="18" height="3.5" rx="1.75" fill="white" opacity="0.35"/>
</svg>